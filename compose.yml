services:
  mysql:
    image: mysql:8.0
    container_name: forohub-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ForoHub
      MYSQL_USER: foro_user
      MYSQL_PASSWORD: foro_pass
    ports:
      - "3306:3306"
    volumes:
      - ./sql/create_schema.sql:/docker-entrypoint-initdb.d/create_schema.sql

